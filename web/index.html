<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RE Tension — FPS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; background: #000; overflow: hidden;
      overscroll-behavior: none;
    }
    #display {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: none;
      overscroll-behavior: none;
    }
    #nick-form {
      display: none;
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
    }
    #nick-form input {
      background: #1a1a1a;
      color: #fff;
      border: 2px solid #e74c3c;
      padding: 8px 12px;
      font: 16px monospace;
      text-align: center;
      width: 180px;
      outline: none;
    }
    #nick-form button {
      display: block;
      margin: 8px auto 0;
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 8px 24px;
      font: bold 14px monospace;
      cursor: pointer;
      width: 100%;
    }
    #nick-form button:hover { background: #c0392b; }
  </style>
</head>
<body>
  <canvas id="display"></canvas>
  <!-- Nickname submission overlay (shown on game over) -->
  <div id="nick-form">
    <input id="nick-input" type="text" maxlength="12" placeholder="닉네임 (최대 12자)" autocomplete="off" spellcheck="false">
    <button id="nick-submit">점수 제출</button>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
